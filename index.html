<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agendamento Barbearia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <img src="img/logo.jpg" style="width:120px; display:block; margin:0 auto 10px;">
        <h1>Agendar Corte</h1>

        <form id="formAgendamento">
            <input type="text" id="nome" placeholder="Seu nome" required>
            <input type="text" id="whatsapp" placeholder="WhatsApp" required>
            <select id="barbeiro"></select>
            <select id="servico">
                <option value="Corte">Corte</option>
                <option value="Corte + Barba">Corte + Barba</option>
                <option value="Corte + Barba">Corte + Barba + Sobramcelha</option>
            </select>

           <input type="date" id="data" required>
            <div id="horarios" class="horarios-grid"></div>
            <input type="hidden" id="horaSelecionada">
            

            <button type="submit">Agendar</button>
        </form>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="script.js"></script>

</body>

</html>
